<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Exam Result | {{ course.name }}</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>
  <body class="bg-light">
    <div class="container py-5">
      <div class="card shadow-sm border-0">
        <div class="card-body p-4 p-md-5">
          {% if passed %}
          <h1 class="h3 text-success">Congratulations! You passed the exam.</h1>
          {% else %}
          <h1 class="h3 text-danger">
            Keep going. You did not pass this time.
          </h1>
          {% endif %}

          <p class="lead mt-3 mb-4">
            Score: <span class="fw-bold">{{ earned }}/{{ total }}</span>
          </p>

          <h2 class="h5">Exam Results</h2>
          <p class="mb-1">
            Course: <span class="fw-semibold">{{ course.name }}</span>
          </p>
          <p class="mb-1">
            Submission ID: <span class="fw-semibold">{{ submission.id }}</span>
          </p>
          <p class="mb-0">
            Submitted at:
            <span class="fw-semibold">{{ submission.submitted_at }}</span>
          </p>

          <div class="mt-4">
            <a
              class="btn btn-outline-primary"
              href="{% url 'onlinecourse:course_details' course.id %}"
              >Back to course</a
            >
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
